name: English Bot

on:
  schedule:
    - cron: '0 */3 * * *'  # كل 3 ساعات
  workflow_dispatch:       # يخليك تشغله بإيدك

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Run Bot
        run: dotnet run
